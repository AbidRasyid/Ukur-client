name: ukur_client
description: Aplikasi penyimpan data ukuran pelanggan untuk penjahit
publish_to: 'none'

version: 1.2.1+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utility
  intl: ^0.19.0
  uuid: ^4.5.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Hive generator
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

  # Icons & splash
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"

flutter_native_splash:
  color: "#7A5A45"
  image: assets/icons/Logo.png

  android: true
  ios: true

  android_12:
    color: "#7A5A45"
    image: assets/icons/Logo.png
    icon_background_color: "#7A5A45"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/