name: ukur_client
description: Aplikasi penyimpan data ukuran pelanggan untuk penjahit (UMKM Friendly).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.2
  url_launcher: ^6.1.5
  flutter_native_splash: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/logo.png"
  adaptive_icon_background: "#7A5A45"
  adaptive_icon_foreground: "assets/icons/logo.png"
  remove_alpha_ios: true

flutter_native_splash:
  android: true
  ios: true
  color: "#7A5A45"
  image: "assets/icons/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
